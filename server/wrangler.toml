name = "kunsy-hub-keys"
main = "worker.js"
compatibility_date = "2025-01-01"

# custom domain: api.kunsydev.xyz -> Worker (+ workers.dev tetap nyala sbg fallback)
workers_dev = true
routes = [
  { pattern = "api.kunsydev.xyz", custom_domain = true }
]

# KV namespace buat nyimpen key.
# ID di bawah diisi otomatis pas jalanin:
#   npx wrangler kv namespace create KEYS
# terus paste id-nya ke sini.
[[kv_namespaces]]
binding = "KEYS"
id = "87ee0e470c1444eb90d99044c50e794e"

# ADMIN_SECRET di-set lewat:
#   npx wrangler secret put ADMIN_SECRET
# (jangan ditaruh di file ini biar nggak ke-commit)
